{% extends "base.html" %}

{% block content %}

<h1>Delete product</h1>

<p>Are you sure you want to delete:</p>

<strong>{{ product.name }}</strong>

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<a href="{% url 'catalog:product_detail' product.pk %}">Cancel</a>

{% endblock %}

{% extends "base.html" %}

{% block content %}

<h1>Delete category</h1>

<p>Are you sure you want to delete:</p>

<strong>{{ category.name }}</strong>

{% if category.parent %}
    <p>Parent: {{ category.parent.name }}</p>
{% endif %}

<form method="post">
    {% csrf_token %}
    <button type="submit">Yes, delete</button>
</form>

<a href="{% url 'catalog:category_list' %}">Cancel</a>

{% endblock %}

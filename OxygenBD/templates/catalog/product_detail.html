{% extends "base.html" %}

{% block content %}

<h1>{{ product.name }}</h1>

<p>{{ product.description }}</p>
<p>Created: {{ product.created_at }}</p>

<hr>

<a href="{% url 'catalog:product_update' product.pk %}">Edit</a>
<div class="card">
<form method="post" action="{% url 'catalog:product_delete' product.pk %}">
    {% csrf_token %}
    <button type="submit">Delete</button>
</form>
</div>
<a href="{% url 'catalog:product_list' %}">Back</a>

{% endblock %}

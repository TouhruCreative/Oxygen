{% extends "base.html" %}

{% block title %}{{ shop.name }}{% endblock %}

{% block content %}

<div class="card">

    <h2>{{ shop.name }}</h2>

    <p>{{ shop.description }}</p>

    <p><strong>Рейтинг:</strong> {{ shop.rating }}</p>
    <p><strong>Создан:</strong> {{ shop.created_at }}</p>

    {% if user == shop.owner %}
        <a href="{% url 'shop_edit' shop.id %}" class="button">Редактировать</a>
        <a href="{% url 'shop_delete' shop.id %}" class="button" style="background:red;">Удалить</a>
    {% endif %}

    <a href="{% url 'shop_list' %}" class="link">← Назад</a>

</div>

{% endblock %}

{% extends "base.html" %}
{% load static %}

{% block title %}Заказ{% endblock %}

{% block styles %}
<link rel="stylesheet" href="{% static 'orders/styles/orders.css' %}">
{% endblock %}

{% block content %}
<div class="orders-card">

    <h2>Заказ #{{ order.id }}</h2>

    <p><strong>Статус:</strong> {{ order.status }}</p>
    <p><strong>Пользователь:</strong> {{ order.user.email }}</p>

    <a href="{% url 'orders_list' %}" class="btn">Назад</a>

</div>
{% endblock %}
